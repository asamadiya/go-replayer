# GitHub Actions workflow for go-replayer.
# Not active here: GitHub only runs workflows under .github/workflows/. To enable
# CI, move this file there with a token that has the `workflow` scope:
#   git mv ci/ci.yml .github/workflows/ci.yml && git commit && git push
name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...
      - name: Enforce coverage floor
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {sub(/%/,"",$3); print $3}')
          echo "Total statement coverage: ${total}%"
          awk -v c="$total" 'BEGIN { if (c+0 < 40.0) { printf "coverage %.1f%% is below the 40%% floor\n", c; exit 1 } }'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
