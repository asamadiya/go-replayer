run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - unconvert
    - errcheck

linters-settings:
  errcheck:
    # Print/format helpers and best-effort stderr diagnostics are intentionally
    # unchecked throughout the CLIs; excluding them keeps the signal high.
    exclude-functions:
      - fmt.Print
      - fmt.Printf
      - fmt.Println
      - fmt.Fprint
      - fmt.Fprintf
      - fmt.Fprintln
      - (*os.File).Close

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
